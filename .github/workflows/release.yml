name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - app-v*

jobs:
  publish-tauri:
    name: Build and draft release (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --config src-tauri/tauri.release.conf.json --target aarch64-apple-darwin
          - platform: macos-latest
            args: --config src-tauri/tauri.release.conf.json --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --config src-tauri/tauri.release.conf.json
          - platform: windows-latest
            args: --config src-tauri/tauri.azure-signing.conf.json

    runs-on: ${{ matrix.platform }}
    environment: release

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
      AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
      AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Setup .NET for Azure Artifact Signing
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Azure Artifact Signing CLI
        if: matrix.platform == 'windows-latest'
        run: cargo install artifact-signing-cli --locked

      - name: Verify Windows signing toolchain
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Get-Command powershell
          Get-Command artifact-signing-cli

          $azureCli = Get-Command az.cmd -ErrorAction SilentlyContinue
          if (-not $azureCli) {
            $azureCli = Get-Command az -ErrorAction SilentlyContinue
          }
          if (-not $azureCli) {
            throw "Azure CLI was not found on PATH."
          }

          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue
          }
          if (-not $signtool) {
            throw "signtool.exe was not found."
          }

          if (-not (Test-Path scripts/sign-windows.ps1)) {
            throw "scripts/sign-windows.ps1 was not found."
          }
          if (-not (Test-Path src-tauri/scripts/sign-windows.ps1)) {
            throw "src-tauri/scripts/sign-windows.ps1 was not found."
          }

          "AZURE_CLI_PATH=$($azureCli.Source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SIGNTOOL_PATH=$($signtool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using Azure CLI: $($azureCli.Source)"
          Write-Host "Using signtool: $($signtool.FullName)"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ env.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ env.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ env.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
        with:
          tagName: app-v__VERSION__
          releaseName: TradeProject v__VERSION__
          releaseBody: See the assets to download and install this version.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
